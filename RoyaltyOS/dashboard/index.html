/* ── Jargon Tooltip ─────────────────────────────────────────────────────── */
function JTip({ term, plain, children }) {
  const [open, setOpen] = useState(false);
  return (
    <span style={{position:"relative",display:"inline"}}>
      <span
        onClick={() => setOpen(v=>!v)}
        style={{borderBottom:"1px dashed #a038b2",cursor:"pointer",color:"#7420a0",fontWeight:600,fontSize:"inherit"}}>
        {children || term}
      </span>
      {open && (
        <>
          <span onClick={() => setOpen(false)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:80}}/>
          <span style={{position:"absolute",bottom:"calc(100% + 6px)",left:"50%",transform:"translateX(-50%)",zIndex:90,backgroundColor:"#1f1135",color:"white",borderRadius:10,padding:"8px 12px",fontSize:11,lineHeight:1.5,whiteSpace:"normal",minWidth:200,maxWidth:260,display:"block",boxShadow:"0 8px 24px rgba(0,0,0,0.2)"}}>
            <span style={{fontWeight:700,fontSize:11,color:"#d4a8e0",display:"block",marginBottom:3}}>{term}</span>
            {plain}
            <span style={{position:"absolute",bottom:-5,left:"50%",transform:"translateX(-50%)",width:10,height:10,backgroundColor:"#1f1135",clipPath:"polygon(0 0,100% 0,50% 100%)"}}/>
          </span>
        </>
      )}
    </span>
  );
}

/* ── Shared UI ──────────────────────────────────────────────────────────── */
function Chip({ type }) {
  const m = {
    Registered:["#edf7f3","#1a7a50","Registered"],
    Active:    ["#edf7f3","#1a7a50","Active"],
    Approved:  ["#edf7f3","#1a7a50","Approved"],
    Published: ["#edf7f3","#1a7a50","Published"],
    Completed: ["#edf7f3","#1a7a50","Completed"],
    verified:  ["#edf7f3","#1a7a50","Verified"],
    Pending:   ["#fef9ed","#a06010","Pending"],
    pending:   [AL,A,"In Progress"],
  };
  const [bg,color,label] = m[type] || m.Pending;
  return (
    <span style={{backgroundColor:bg,color,padding:"2px 10px",borderRadius:9999,fontSize:11,fontWeight:500,whiteSpace:"nowrap",display:"inline-flex",alignItems:"center"}}>
      {label}
    </span>
  );
}
function Card({ children, className="" }) {
  return <div className={`bg-white rounded-2xl border border-gray-100 shadow-sm ${className}`}>{children}</div>;
}
function SectionHeader({ title, subtitle }) {
  return (
    <div className="mb-4">
      <h2 className="text-sm font-semibold text-gray-900">{title}</h2>
      {subtitle && <p className="text-xs text-gray-400 mt-0.5 leading-relaxed">{subtitle}</p>}
    </div>
  );
}

          <button onClick={() => setExpanded(v=>!v)} style={{marginTop:8,fontSize:11,fontWeight:600,color:"#d97706",background:"none",border:"none",cursor:"pointer",padding:0}}>
            {expanded ? "Show less ↑" : "How to verify usage accuracy →"}
          </button>
        </div>
        <div style={{flexShrink:0,display:"flex",alignItems:"center",gap:4,backgroundColor:"#fde68a",borderRadius:8,padding:"3px 8px"}}>
          <Eye size={10} style={{color:"#92400e"}}/>
          <span style={{fontSize:10,fontWeight:700,color:"#92400e"}}>Review</span>
        </div>
      </div>
    </div>
  );
}

/* ── Payment Proof ──────────────────────────────────────────────────────── */
const PROOF_PLAIN = {
  "Rule Approved":     { label:"You and the platform agreed on your cut",    desc:"Your royalty rate was locked in and both sides confirmed it in writing (digitally)." },
  "Usage Recorded":    { label:"They counted how many times your work was used", desc:"The platform logged every stream, download, or play of your music in this billing period." },
  "Payment Completed": { label:"Money landed in your account",               desc:"The calculated royalty amount was transferred to you. This is the actual payout." },
  "Proof Stored":      { label:"A permanent record is being created",        desc:"An unchangeable digital receipt is being saved so you always have proof this happened." },
};

function PaymentProof() {
  const plain = usePlain();
  const [modal, setModal] = useState(null);
  return (
    <section className="mb-7">
      <SectionHeader title="Payment Proof"
        subtitle={plain
          ? "A receipts trail showing every step of your royalty payment — in plain terms."
          : "Verified records for each stage of your royalty settlement. Click 'Details' to view technical information."} />
      <UsageVerificationNotice />
      <div className="space-y-2.5">
        {PROOF.map(item => {
          const pp = PROOF_PLAIN[item.label];
          return (
          <Card key={item.id} className="p-4">
            <div className="flex items-start sm:items-center justify-between gap-3">
              <div className="flex items-start sm:items-center gap-3">
                <div className="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0"
                  style={{backgroundColor:item.status==="verified"?"#edf7f3":AL}}>
                  {item.status==="verified"
                    ? <CheckCircle size={16} style={{color:"#1a7a50"}}/>
                    : <Clock size={16} style={{color:A}}/>}
                </div>
                <div>
                  <div className="text-sm font-semibold text-gray-900">{plain && pp ? pp.label : item.label}</div>
                  <div className="text-xs text-gray-500 mt-0.5">{plain && pp ? pp.desc : item.desc}</div>
                  <div className="text-xs text-gray-300 mt-0.5">{item.date}</div>
                </div>
              </div>
              <div className="flex items-center gap-2 flex-shrink-0">
                <Chip type={item.status}/>
                {item.tx && (
                  <button
                    style={{color:A,borderColor:AM,backgroundColor:AL,padding:"5px 12px",borderRadius:8,border:`1px solid ${AM}`,fontSize:12,fontWeight:600,cursor:"pointer"}}
                    onClick={() => setModal(item)}>
                    {plain ? "Receipt" : "Details"}
                  </button>
                )}
              </div>
            </div>
          </Card>
          );
        })}
      </div>

      {/* Modal */}
      {modal && (
        <div onClick={() => setModal(null)}
          style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:50,display:"flex",alignItems:"center",justifyContent:"center",backgroundColor:"rgba(0,0,0,0.28)",backdropFilter:"blur(4px)"}}>
          <div onClick={e => e.stopPropagation()}
            style={{backgroundColor:"white",width:"calc(100% - 32px)",maxWidth:448,borderRadius:24,padding:24,boxShadow:"0 25px 50px -12px rgba(0,0,0,0.25)"}}>
            <div className="flex items-center justify-between mb-4">
              <h3 className="text-sm font-semibold text-gray-900">{plain ? "Payment Receipt" : "Technical Details"}</h3>
              <button onClick={() => setModal(null)}
                style={{width:24,height:24,borderRadius:"50%",backgroundColor:"#f3f4f6",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}}>
                <XIco size={13}/>
              </button>
            </div>

            {plain && PROOF_PLAIN[modal.label] && (
              <div style={{backgroundColor:"#f0e8fa",borderRadius:12,padding:"10px 12px",marginBottom:12,border:"1px solid #d4a8e0"}}>
                <div style={{fontSize:10,fontWeight:700,color:A,textTransform:"uppercase",letterSpacing:"0.05em",marginBottom:3}}>💬 In plain terms</div>
                <div style={{fontSize:12,color:"#3d0060",lineHeight:1.5}}>{PROOF_PLAIN[modal.label].desc}</div>
              </div>
            )}

            <div style={{display:"flex",flexDirection:"column",gap:8}}>
              <div style={{padding:12,borderRadius:12,backgroundColor:"#f9f8fa"}}>
                <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>{plain ? "What happened" : "Event"}</div>
                <div style={{fontSize:13,fontWeight:500,color:"#111827"}}>{plain && PROOF_PLAIN[modal.label] ? PROOF_PLAIN[modal.label].label : modal.label}</div>
              </div>
              <div style={{padding:12,borderRadius:12,backgroundColor:"#f9f8fa"}}>
                <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>{plain ? "When" : "Date recorded"}</div>
                <div style={{fontSize:13,fontWeight:500,color:"#111827"}}>{modal.date}</div>
              </div>
              <div style={{padding:12,borderRadius:12,backgroundColor:"#f9f8fa"}}>
                <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>
                  {plain
                    ? <span>Receipt ID <JTip term="Transaction Reference" plain="A unique code that permanently identifies this event on a distributed ledger — like a bank transfer reference, but impossible to fake or alter.">(what's this?)</JTip></span>
                    : "Transaction reference"}
                </div>
                <div style={{fontSize:13,fontWeight:500,color:"#111827",fontFamily:"monospace"}}>{modal.tx}</div>
              </div>
              <div style={{padding:12,borderRadius:12,backgroundColor:"#f9f8fa"}}>
                <div style={{fontSize:11,color:"#9ca3af",marginBottom:4}}>
                  {plain
                    ? <span>How it's stored <JTip term="Distributed Ledger" plain="Think of it like a Google Doc that thousands of computers share simultaneously — no one person can edit or delete it. Your record is permanent.">ⓘ</JTip></span>
                    : "Storage type"}
                </div>
                <div style={{fontSize:13,fontWeight:500,color:"#111827"}}>
                  {plain
                    ? "Permanent digital record — can't be edited or deleted"
                    : "Distributed ledger · Immutable"}
                </div>
              </div>
            </div>
            <button onClick={() => window.open("https://explorer.example.com/tx/"+modal.tx, "_blank")} style={{marginTop:16,width:"100%",padding:"11px 0",borderRadius:12,backgroundColor:A,color:"white",fontSize:13,fontWeight:600,border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
              <ExternalLink size={13}/> {plain ? "View permanent receipt" : "View on explorer"}
            </button>
          </div>
        </div>
      )}
    </section>
  );
}

/* ── Recent Activity ────────────────────────────────────────────────────── */
function RecentActivity() {
  const IC = {
    payment:{icon:DollarSign,bg:"#edf7f3",c:"#1a7a50"},
    proof:  {icon:Shield,    bg:AL,       c:A        },
    rule:   {icon:FileText,  bg:"#fef9ed",c:"#b06010"},
    work:   {icon:Music,     bg:"#eef3ff",c:"#3060c8"},
  };
  return (
    <section className="mb-7">
      <SectionHeader title="Recent Activity" subtitle="A log of key events across your works, payments, and proofs." />
      <Card className="divide-y divide-gray-50">
        {ACTIVITY.map(item => {
          const cfg = IC[item.type] || IC.rule;
          const Icon = cfg.icon;
          return (
            <div key={item.id} className="px-4 py-3.5 flex items-center gap-3">
              <div className="w-8 h-8 rounded-xl flex items-center justify-center flex-shrink-0"
                style={{backgroundColor:cfg.bg}}>
                <Icon size={14} style={{color:cfg.c}}/>
              </div>
              <div className="flex-1 min-w-0">
                <div className="text-sm text-gray-800 leading-snug">{item.text}</div>
                {item.detail && <div className="text-xs font-semibold mt-0.5" style={{color:A}}>{item.detail}</div>}
              </div>
              <div className="text-xs text-gray-300 flex-shrink-0">{item.date}</div>
            </div>
          );
        })}
      </Card>
    </section>
  );
}

/* ── Navigation ─────────────────────────────────────────────────────────── */
const NAV = [
  {id:"overview",label:"Overview",icon:LayoutGrid},
  {id:"payments",label:"Payments",icon:CreditCard},
  {id:"proof",   label:"Proof",   icon:Shield    },
];

function Sidebar({ active, set }) {
  return (
    <aside className="hidden lg:flex flex-col bg-white border-r border-gray-100 py-5 px-3"
      style={{width:224,minHeight:"100vh",flexShrink:0}}>
      <div className="flex items-center gap-2.5 px-2 mb-7">
        <div className="w-7 h-7 rounded-xl flex items-center justify-center" style={{backgroundColor:A}}>
          <Zap size={13} style={{color:"white"}}/>
        </div>
        <div>
          <div className="text-sm font-bold text-gray-900 leading-tight">RoyaltyOS</div>
          <div style={{fontSize:9,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.05em"}}>Creator Portal</div>
        </div>
      </div>
      <nav style={{flex:1,display:"flex",flexDirection:"column",gap:2}}>
        {NAV.map(t => {
          const Icon = t.icon;
          const on = active===t.id;
          return (
            <button key={t.id} onClick={() => set(t.id)}
              className="w-full flex items-center gap-2.5 rounded-xl text-sm font-medium"
              style={{padding:"10px 12px",backgroundColor:on?A:"transparent",color:on?"white":"#6b7280",border:"none",cursor:"pointer",textAlign:"left",transition:"all 0.15s"}}>
              <Icon size={15}/> {t.label}
            </button>
          );
        })}
      </nav>
      <div className="border-t border-gray-100 pt-3.5 mt-3">
        <div className="flex items-center gap-2.5 px-2">
          <div className="w-7 h-7 rounded-full flex items-center justify-center text-white font-bold flex-shrink-0"
            style={{backgroundColor:A,fontSize:10}}>AW</div>
          <div className="min-w-0">
            <div className="text-xs font-semibold text-gray-900 truncate">Farel Ramadhana</div>
            <div className="text-xs text-gray-400">Creator</div>
          </div>
        </div>
      </div>
    </aside>
  );
}

function BottomNav({ active, set }) {
  return (
    <nav className="lg:hidden"
      style={{position:"fixed",bottom:0,left:0,right:0,backgroundColor:"white",borderTop:"1px solid #f3f4f6",display:"flex",zIndex:40}}>
      {NAV.map(t => {
        const Icon = t.icon;
        const on = active===t.id;
        return (
          <button key={t.id} onClick={() => set(t.id)}
            style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"10px 0 8px",gap:3,border:"none",backgroundColor:"transparent",cursor:"pointer"}}>
            <Icon size={19} style={{color:on?A:"#9ca3af"}}/>
            <span style={{fontSize:10,fontWeight:500,color:on?A:"#9ca3af"}}>{t.label}</span>
          </button>
        );
      })}
    </nav>
  );
}

function TopHeader({ active, plain, setPlain }) {
  const [showNotif, setShowNotif] = useState(false);
  const subs = {
    overview:"Registered works and royalty status",
    payments:"Track and review your royalty payments",
    proof:   "Verified settlement records",
  };
  const NOTIFS = [
    {icon:DollarSign, bg:"#edf7f3", c:"#1a7a50", text:"Payment of $842.00 received", sub:"Resonance Vol. 1 · Apr 10"},
    {icon:Shield,     bg:AL,        c:A,          text:"Proof record verified",        sub:"March payment cycle · Apr 5"},
    {icon:CheckCircle,bg:"#edf7f3", c:"#1a7a50", text:"Royalty rule approved",        sub:"The Quiet Hours EP · Mar 5"},
  ];
  return (
    <header style={{position:"sticky",top:0,zIndex:30,backgroundColor:"rgba(255,255,255,0.9)",backdropFilter:"blur(12px)",borderBottom:"1px solid #f3f4f6",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div>
        <div className="text-sm font-semibold text-gray-900">{NAV.find(t=>t.id===active)?.label}</div>
        <div className="text-xs text-gray-400 hidden sm:block mt-0.5">{subs[active]}</div>
      </div>
      <div className="flex items-center gap-2" style={{position:"relative"}}>
        {/* Plain English Toggle */}
        <button
          onClick={() => setPlain(v=>!v)}
          title={plain ? "Switch to technical view" : "Switch to Plain English"}
          style={{display:"flex",alignItems:"center",gap:5,padding:"5px 10px",borderRadius:10,border:`1px solid ${plain?"#a038b2":"#e5e7eb"}`,backgroundColor:plain?AL:"#f9fafb",cursor:"pointer",transition:"all 0.15s"}}>
          <MessageSquare size={12} style={{color:plain?A:"#9ca3af"}}/>
          <span style={{fontSize:11,fontWeight:600,color:plain?A:"#9ca3af",whiteSpace:"nowrap"}}>
            {plain ? "Plain English ON" : "Plain English"}
          </span>
        </button>
        <button onClick={() => setShowNotif(v=>!v)} style={{width:28,height:28,borderRadius:10,backgroundColor:showNotif?AL:"#f9fafb",border:showNotif?`1px solid ${AM}`:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",position:"relative"}}>
          <Bell size={14} style={{color:showNotif?A:"#9ca3af"}}/>
          <span style={{position:"absolute",top:4,right:4,width:6,height:6,borderRadius:"50%",backgroundColor:A,border:"2px solid white"}}/>
        </button>
        {showNotif && (
          <>
            <div onClick={() => setShowNotif(false)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:40}}/>
            <div style={{position:"absolute",top:36,right:0,width:300,backgroundColor:"white",borderRadius:16,boxShadow:"0 10px 40px rgba(0,0,0,0.12)",border:"1px solid #f3f4f6",zIndex:50,overflow:"hidden"}}>
              <div style={{padding:"12px 16px 8px",borderBottom:"1px solid #f9fafb"}}>
                <div style={{fontSize:12,fontWeight:700,color:"#111827"}}>Notifications</div>
              </div>
              {NOTIFS.map((n,i) => {
                const Icon = n.icon;
                return (
                  <div key={i} onClick={() => setShowNotif(false)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",cursor:"pointer",borderBottom:i<NOTIFS.length-1?"1px solid #f9fafb":"none"}}>
                    <div style={{width:32,height:32,borderRadius:10,backgroundColor:n.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      <Icon size={13} style={{color:n.c}}/>
                    </div>
                    <div style={{minWidth:0}}>
                      <div style={{fontSize:12,fontWeight:500,color:"#111827",lineHeight:1.3}}>{n.text}</div>
                      <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{n.sub}</div>
                    </div>
                  </div>
                );
              })}
              <div style={{padding:"10px 16px",backgroundColor:"#f9fafb",textAlign:"center"}}>
                <span style={{fontSize:11,color:A,fontWeight:600,cursor:"pointer"}} onClick={() => setShowNotif(false)}>See all activity</span>
              </div>
            </div>
          </>
        )}
        <div className="lg:hidden w-7 h-7 rounded-full flex items-center justify-center text-white font-bold"
          style={{backgroundColor:A,fontSize:10}}>AW</div>
      </div>
    </header>
  );
}

/* ── App ────────────────────────────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState("overview");
  const [plain, setPlain] = useState(false);
  return (
    <PlainCtx.Provider value={plain}>
    <div style={{display:"flex",minHeight:"100vh",backgroundColor:"#f5f3f8"}}>
      <Sidebar active={tab} set={setTab}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        <TopHeader active={tab} plain={plain} setPlain={setPlain}/>
        {plain && (
          <div style={{backgroundColor:"#f0e8fa",borderBottom:"1px solid #d4a8e0",padding:"8px 20px",display:"flex",alignItems:"center",gap:8}}>
            <MessageSquare size={12} style={{color:A,flexShrink:0}}/>
            <span style={{fontSize:11,color:"#5a1a7a",lineHeight:1.4}}>
              <strong>Plain English mode is on.</strong> Legal and financial terms are translated into everyday language throughout this dashboard. Tap any <span style={{borderBottom:"1px dashed #a038b2",color:"#7420a0",fontWeight:600}}>underlined term</span> for more detail.
            </span>
          </div>
        )}
        <main style={{flex:1,padding:"16px 16px 96px",overflowY:"auto"}}>
          <div style={{maxWidth:900,margin:"0 auto"}}>
            {tab==="overview" && <><HeroBanner setTab={setTab}/><AccountOverview/><MyWorks/><RoyaltyRules/></>}
            {tab==="payments" && <><PaymentProgress/><PaymentHistory/></>}
            {tab==="proof"    && <><PaymentProof/><RecentActivity/></>}
          </div>
        </main>
      </div>
      <BottomNav active={tab} set={setTab}/>
    </div>
    </PlainCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>

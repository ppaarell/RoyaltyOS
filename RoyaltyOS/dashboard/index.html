    stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
    {children}

);
const LayoutGrid   = ({size=16}) => <SI size={size}><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></SI>;

const FileText     = ({size=16}) => <SI size={size}><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></SI>;

const CheckCircle  = ({size=16}) => <SI size={size}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></SI>;
const Clock        = ({size=16}) => <SI size={size}><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></SI>;
const Bell         = ({size=16}) => <SI size={size}><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></SI>;
const XIco         = ({size=16}) => <SI size={size}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></SI>;

/* ── Shared UI ──────────────────────────────────────────────────────────── */
function Chip({ type }) {
  const m = {
    Registered:["#edf7f3","#1a7a50","Registered"],
    Active:    ["#edf7f3","#1a7a50","Active"],
    Approved:  ["#edf7f3","#1a7a50","Approved"],
    Published: ["#edf7f3","#1a7a50","Published"],
    Completed: ["#edf7f3","#1a7a50","Completed"],
    verified:  ["#edf7f3","#1a7a50","Verified"],
    Pending:   ["#fef9ed","#a06010","Pending"],
    pending:   [AL,A,"In Progress"],
  };
  const [bg,color,label] = m[type] || m.Pending;
  return (
    <span style={{backgroundColor:bg,color,padding:"2px 10px",borderRadius:9999,fontSize:11,fontWeight:500,whiteSpace:"nowrap",display:"inline-flex",alignItems:"center"}}>
      {label}
    </span>
  );
}
function Card({ children, className="" }) {
  return <div className={`bg-white rounded-2xl border border-gray-100 shadow-sm ${className}`}>{children}</div>;
}
function SectionHeader({ title, subtitle }) {
  return (
    <div className="mb-4">
      <h2 className="text-sm font-semibold text-gray-900">{title}</h2>
      {subtitle && <p className="text-xs text-gray-400 mt-0.5 leading-relaxed">{subtitle}</p>}
    </div>
  );
}

            <div key={step.id} className="flex flex-col items-center flex-1 px-1" style={{zIndex:10}}>
              <div className="w-10 h-10 rounded-full flex items-center justify-center border-2 mb-2.5"
                style={{backgroundColor:step.done?"#22c55e":"white",borderColor:step.done?"#22c55e":"#e5e7eb"}}>
                {step.done
                  ? <CheckCircle size={17} style={{color:"white"}}/>
                  : <Clock size={14} style={{color:"#d1d5db"}}/>}
              </div>
              <div className="text-center" style={{fontSize:11,fontWeight:600,color:"#1f2937",lineHeight:"1.3"}}>{step.label}</div>
              <div className="text-center mt-0.5" style={{fontSize:10,color:"#9ca3af",lineHeight:"1.4"}}>{step.desc}</div>
              {step.date && <div className="mt-1" style={{fontSize:10,color:"#d1d5db"}}>{step.date}</div>}
            </div>
          ))}
        </div>
        {/* Mobile stepper */}
        <div className="md:hidden">
          {STEPS.map((step,i) => (
            <div key={step.id} className="flex gap-3">
              <div className="flex flex-col items-center">
                <div className="w-8 h-8 rounded-full flex items-center justify-center border-2 flex-shrink-0"
                  style={{backgroundColor:step.done?"#22c55e":"white",borderColor:step.done?"#22c55e":"#e5e7eb"}}>
                  {step.done
                    ? <CheckCircle size={14} style={{color:"white"}}/>
                    : <Clock size={12} style={{color:"#d1d5db"}}/>}
                </div>
                {i < STEPS.length-1 && (
                  <div className="w-px h-7" style={{backgroundColor:step.done?"#86efac":"#f3f4f6"}}/>
                )}
              </div>
              <div className="pb-4 pt-1 min-w-0">
                <div className="text-sm font-semibold text-gray-800">{step.label}</div>
                <div className="text-xs text-gray-400">{step.desc}</div>
                {step.date && <div className="text-xs text-gray-300 mt-0.5">{step.date}</div>}
              </div>
            </div>
          ))}
        </div>
      </Card>
    </section>
  );
}

    {icon:DollarSign, bg:"#edf7f3", c:"#1a7a50", text:"Payment of $842.00 received", sub:"Resonance Vol. 1 · Apr 10"},

    {icon:CheckCircle,bg:"#edf7f3", c:"#1a7a50", text:"Royalty rule approved",        sub:"The Quiet Hours EP · Mar 5"},
  ];
  return (
    <header style={{position:"sticky",top:0,zIndex:30,backgroundColor:"rgba(255,255,255,0.9)",backdropFilter:"blur(12px)",borderBottom:"1px solid #f3f4f6",padding:"12px 20px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
      <div>
        <div className="text-sm font-semibold text-gray-900">{NAV.find(t=>t.id===active)?.label}</div>

      <div className="flex items-center gap-2" style={{position:"relative"}}>

        </button>
        {showNotif && (
          <>
            <div onClick={() => setShowNotif(false)} style={{position:"fixed",top:0,left:0,right:0,bottom:0,zIndex:40}}/>
            <div style={{position:"absolute",top:36,right:0,width:300,backgroundColor:"white",borderRadius:16,boxShadow:"0 10px 40px rgba(0,0,0,0.12)",border:"1px solid #f3f4f6",zIndex:50,overflow:"hidden"}}>

                <div style={{fontSize:12,fontWeight:700,color:"#111827"}}>Notifications</div>
              </div>
              {NOTIFS.map((n,i) => {
                const Icon = n.icon;
                return (
                  <div key={i} onClick={() => setShowNotif(false)} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",cursor:"pointer",borderBottom:i<NOTIFS.length-1?"1px solid #f9fafb":"none"}}>

          style={{backgroundColor:A,fontSize:10}}>AW</div>
      </div>
    </header>

/* ── App ────────────────────────────────────────────────────────────────── */
function App() {
  const [tab, setTab] = useState("overview");
  return (
    <div style={{display:"flex",minHeight:"100vh",backgroundColor:"#f5f3f8"}}>
      <Sidebar active={tab} set={setTab}/>
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0}}>
        <TopHeader active={tab}/>
        <main style={{flex:1,padding:"16px 16px 96px",overflowY:"auto"}}>
          <div style={{maxWidth:900,margin:"0 auto"}}>
            {tab==="overview" && <><HeroBanner setTab={setTab}/><AccountOverview/><MyWorks/><RoyaltyRules/></>}
            {tab==="payments" && <><PaymentProgress/><PaymentHistory/></>}
            {tab==="proof"    && <><PaymentProof/><RecentActivity/></>}
          </div>
        </main>
      </div>
      <BottomNav active={tab} set={setTab}/>

}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
